<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONBOX — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── 전역 CSS 변수 (색상 팔레트) ── */
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff3c;       /* 메인 포인트 색 (형광 노랑) */
    --accent2: #ff4d2e;      /* 서브 포인트 색 (오렌지-레드) */
    --text: #f0f0f0;
    --muted: #666;
    --card: #161616;
    --kakao: #FEE500;        /* 카카오 공식 브랜드 색 */
    --kakao-text: #191919;
    --naver: #03C75A;        /* 네이버 공식 브랜드 색 */
    --naver-text: #fff;
    --error: #ff4d2e;        /* 에러 메시지 색 */
    --input-bg: #1a1a1a;
    --input-border: #333;
    --input-focus: #e8ff3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── 배경: 격자 패턴 (장식용) ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── 배경: 상단 글로우 효과 ── */
  .bg-glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,255,60,0.06) 0%, transparent 70%);
    top: -150px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* ── 배경: 우하단 보조 글로우 ── */
  .bg-glow2 {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,77,46,0.05) 0%, transparent 70%);
    bottom: 0; right: -50px;
    pointer-events: none;
  }

  /* ── 앱 전체 컨테이너 (모바일 최대폭 420px) ── */
  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 0 28px;
  }

  /* ── 상단: 브랜드 로고 + 통계 섹션 ── */
  .top-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 60px;
    animation: fadeInUp 0.5s ease both;
  }

  /* 브랜드 태그 (상단 작은 뱃지) */
  .brand-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,255,60,0.08);
    border: 1px solid rgba(232,255,60,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    width: fit-content;
    margin-bottom: 20px;
  }

  /* 브랜드 태그 좌측 깜빡이는 점 */
  .brand-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
  }

  /* 로고 영역 */
  .logo-wrap { margin-bottom: 12px; }
  .logo-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 4px;
    color: var(--text);
  }
  .logo-main span { color: var(--accent); } /* "BOX" 부분 강조 색 */

  .logo-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* 배경 장식 텍스트 "WOD" — 클릭/선택 불가 */
  .deco-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    color: rgba(255,255,255,0.025);
    letter-spacing: -4px;
    line-height: 1;
    position: absolute;
    right: -10px;
    top: 55px;
    pointer-events: none;
    user-select: none;
  }

  /* 박스 통계 요약 카드 3개 (멤버수 / 기록수 / PR) */
  .stat-pills {
    display: flex;
    gap: 8px;
    margin-top: 28px;
    animation: fadeInUp 0.6s 0.15s ease both;
    opacity: 0;
  }
  .pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1;
    text-align: center;
  }
  .pill-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .pill-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── 하단: 로그인 폼 전체 래퍼 ── */
  .bottom-section {
    padding: 24px 0 env(safe-area-inset-bottom, 40px);
    animation: fadeInUp 0.6s 0.25s ease both;
    opacity: 0;
  }

  /* 섹션 구분 레이블 */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }

  /* ── 소셜 로그인 버튼 공통 스타일 ──
     현재 disabled 상태 / UI만 유지 / 기능은 추후 OAuth 연동 예정 */
  .social-btn {
    width: 100%;
    height: 52px;
    border-radius: 12px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: not-allowed;       /* 비활성화 커서 */
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
    opacity: 0.4;              /* 비활성화 표현 */
  }
  /* "COMING SOON" 우측 뱃지 */
  .social-btn::after {
    content: 'COMING SOON';
    position: absolute;
    right: 14px;
    font-size: 9px;
    letter-spacing: 1.5px;
    opacity: 0.7;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
  }
  .btn-kakao { background: var(--kakao); color: var(--kakao-text); }
  .btn-naver { background: var(--naver); color: var(--naver-text); }

  /* ── 구분선 ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 14px;
  }
  .divider-line  { flex: 1; height: 1px; background: var(--border); }
  .divider-text  {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── 게스트 로그인 폼 박스 ── */
  .guest-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px 16px;
  }

  /* 폼 상단 레이블 */
  .guest-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  /* 레이블 양쪽 가로선 */
  .guest-section-title::before,
  .guest-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── 입력 필드 그룹 (label + input) ── */
  .input-group { margin-bottom: 10px; }

  .input-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  /* 아이콘과 input이 겹치는 래퍼 */
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  /* 입력창 좌측 아이콘 (포인터 이벤트 없음) */
  .input-icon {
    position: absolute;
    left: 12px;
    font-size: 14px;
    color: var(--muted);
    pointer-events: none;
    line-height: 1;
  }

  /* 공통 텍스트 입력창 */
  .input-field {
    width: 100%;
    height: 46px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    padding: 0 12px 0 36px;    /* 좌측 아이콘 공간 */
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    -webkit-appearance: none;  /* iOS 기본 스타일 제거 */
  }
  /* 포커스 시 accent 색 테두리 + 글로우 */
  .input-field:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(232,255,60,0.08);
  }
  .input-field::placeholder { color: #3a3a3a; }

  /* 비밀번호 필드 — 우측 공간 확보 (토글 버튼용) */
  #inputPw { padding-right: 42px; }

  /* 비밀번호 표시/숨김 토글 버튼 (눈 아이콘) */
  .pw-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--accent); }

  /* ── 에러 메시지 박스 ── */
  /* 기본 숨김 상태 / JS에서 .show 클래스 추가로 표시 */
  .error-msg {
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(255,77,46,0.1);
    border: 1px solid rgba(255,77,46,0.25);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--error);
    margin-bottom: 10px;
  }
  .error-msg.show { display: flex; }
  .error-icon { font-size: 14px; flex-shrink: 0; }

  /* ── 로그인 버튼 ── */
  .login-btn {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.18s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .login-btn:hover  { background: #f5ff6e; transform: translateY(-1px); }
  .login-btn:active { transform: scale(0.98); }

  /* 버튼 내부 로딩 스피너 — 로그인 처리 중 표시 */
  .btn-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  /* 버튼에 .loading 클래스 붙으면 스피너 표시 / 텍스트 숨김 */
  .login-btn.loading .btn-spinner { display: block; }
  .login-btn.loading .btn-text    { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── 로딩 오버레이 — 로그인 성공 후 대시보드 전환 화면 ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;    /* 숨겨진 상태에서 클릭 차단 */
    transition: opacity 0.3s;
  }
  .loading-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .loading-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--text);
    margin-bottom: 30px;
  }
  .loading-logo span { color: var(--accent); }
  .loading-bar-wrap {
    width: 180px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.8s ease;
  }
  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
  }

  /* ── 공통 진입 애니메이션 ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .top-section { animation: fadeInUp 0.5s ease both; }

  /* ── 입력 실패 시 폼 흔들기 효과 ── */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<!-- 배경 장식 레이어 -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<!-- 로그인 성공 후 대시보드로 이동 전 전환 화면 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">IRON<span>BOX</span></div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <div class="loading-text" id="loadingText">로그인 중...</div>
</div>

<!-- 메인 앱 래퍼 -->
<div class="app">

  <!-- ═══ 상단: 브랜드 / 로고 / 통계 ═══ -->
  <div class="top-section">
    <div class="deco-text">WOD</div>

    <!-- 서비스 소개 뱃지 -->
    <div class="brand-tag">
      <div class="brand-dot"></div>
      CrossFit Performance Tracker
    </div>

    <!-- 메인 로고 -->
    <div class="logo-wrap">
      <div class="logo-main">IRON<span>BOX</span></div>
      <div class="logo-sub">Track · Compete · Improve</div>
    </div>

    <!-- 박스 현황 통계 카드 -->
    <div class="stat-pills">
      <div class="pill">
        <div class="pill-num">42</div>
        <div class="pill-label">박스 멤버</div>
      </div>
      <div class="pill">
        <div class="pill-num">156</div>
        <div class="pill-label">이번달 기록</div>
      </div>
      <div class="pill">
        <div class="pill-num">12</div>
        <div class="pill-label">PR 달성</div>
      </div>
    </div>
  </div>

  <!-- ═══ 하단: 로그인 ═══ -->
  <div class="bottom-section">

    <div class="section-label">로그인</div>

    <!-- 카카오 로그인 버튼 — UI만 존재 / 기능 추후 OAuth 연동 예정 -->
    <button class="social-btn btn-kakao" disabled>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 2C6.03 2 2 5.36 2 9.5c0 2.65 1.73 4.97 4.32 6.28L5.2 19.5l4.1-2.72c.56.08 1.13.12 1.7.12 4.97 0 9-3.36 9-7.5S15.97 2 11 2z" fill="#191919"/>
      </svg>
      카카오 로그인
    </button>

    <!-- 네이버 로그인 버튼 — UI만 존재 / 기능 추후 OAuth 연동 예정 -->
    <button class="social-btn btn-naver" disabled>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M10.2 9.27L7.6 5H5v8h2.8V8.73L10.4 13H13V5h-2.8v4.27z" fill="white"/>
      </svg>
      네이버 로그인
    </button>

    <!-- 구분선 -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">게스트 로그인</div>
      <div class="divider-line"></div>
    </div>

    <!-- ── 게스트 ID / PW 로그인 폼 ── -->
    <div class="guest-section" id="loginForm">
      <div class="guest-section-title">샘플 계정으로 체험</div>

      <!-- 에러 메시지 박스 (기본 숨김 / 로그인 실패 시 JS로 표시) -->
      <div class="error-msg" id="errorMsg">
        <span class="error-icon">⚠</span>
        <span id="errorText">아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <!-- 아이디 입력 필드 -->
      <div class="input-group">
        <label class="input-label" for="inputId">아이디</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            class="input-field"
            id="inputId"
            type="text"
            placeholder="guest ID 입력"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
          />
        </div>
      </div>

      <!-- 비밀번호 입력 필드 -->
      <div class="input-group">
        <label class="input-label" for="inputPw">비밀번호</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            class="input-field"
            id="inputPw"
            type="password"
            placeholder="비밀번호 입력"
            autocomplete="current-password"
          />
          <!-- 비밀번호 표시/숨김 토글 -->
          <button class="pw-toggle" id="pwToggle" type="button" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <!-- 로그인 제출 버튼 -->
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        <div class="btn-spinner"></div>   <!-- 로딩 중 스피너 -->
        <span class="btn-text">로그인</span>
      </button>

    </div><!-- /guest-section -->
  </div><!-- /bottom-section -->
</div><!-- /app -->

<script>
  /*
   * ══════════════════════════════════════════════
   *  게스트 계정 목록 (임시 하드코딩)
   *
   *  ※ 추후 실제 DB 연동 시 아래 객체를 제거하고
   *    handleLogin() 내부의 fetch('/api/login', ...) 로 대체
   *
   *  구조: { 아이디: { password, name, initials, color } }
   *  - password  : 비밀번호 (실서비스에서는 서버에서만 검증)
   *  - name      : 화면에 표시할 이름
   *  - initials  : 아바타에 표시할 이니셜 (2자)
   *  - color     : 아바타 포인트 색상
   * ══════════════════════════════════════════════
   */
  const GUEST_ACCOUNTS = {
    'guest1': { password: '1234', name: '김지원', initials: 'KJ', color: '#e8ff3c' },
    'guest2': { password: '1234', name: '박지수', initials: 'PJ', color: '#ff4d2e' },
    'guest3': { password: '1234', name: '이현우', initials: 'LH', color: '#3cb4ff' },
  };

  /* ── 페이지 로드 시 처리 ── */
  window.addEventListener('load', () => {
    // 애니메이션 재적용 (opacity:0 으로 초기화된 요소)
    document.querySelector('.stat-pills').style.animation     = 'fadeInUp 0.6s 0.15s ease both';
    document.querySelector('.bottom-section').style.animation = 'fadeInUp 0.6s 0.25s ease both';

    // 이미 로그인된 세션이면 바로 대시보드로 이동 (로그인 화면 스킵)
    if (sessionStorage.getItem('guestName')) {
      window.location.href = 'crossfit-dashboard.html';
    }
  });

  /* ── 비밀번호 표시/숨김 토글 ── */
  function togglePassword() {
    const pw  = document.getElementById('inputPw');
    const btn = document.getElementById('pwToggle');
    if (pw.type === 'password') {
      pw.type          = 'text';
      btn.textContent  = '🙈'; // 숨기기 아이콘으로 변경
    } else {
      pw.type          = 'password';
      btn.textContent  = '👁';  // 보이기 아이콘으로 변경
    }
  }

  /* ── 에러 메시지 표시 + 폼 흔들기 효과 ── */
  function showError(msg) {
    const box  = document.getElementById('errorMsg');
    const text = document.getElementById('errorText');
    text.textContent = msg;
    box.classList.add('show');

    // 폼 흔들기 애니메이션 (시각적 피드백)
    const form = document.getElementById('loginForm');
    form.classList.remove('shake');
    void form.offsetWidth; // reflow — 같은 애니메이션 재실행을 위한 트릭
    form.classList.add('shake');
  }

  /* ── 에러 메시지 숨기기 ── */
  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  /* ── 로그인 처리 메인 함수 ── */
  function handleLogin() {
    const id  = document.getElementById('inputId').value.trim();
    const pw  = document.getElementById('inputPw').value;
    const btn = document.getElementById('loginBtn');

    // 입력값 유효성 검사
    if (!id) {
      showError('아이디를 입력해주세요.');
      document.getElementById('inputId').focus();
      return;
    }
    if (!pw) {
      showError('비밀번호를 입력해주세요.');
      document.getElementById('inputPw').focus();
      return;
    }

    // 버튼을 로딩 상태로 전환 (중복 제출 방지)
    btn.classList.add('loading');
    btn.disabled = true;
    hideError();

    /*
     * ── 인증 처리 (현재: 하드코딩 / 추후: 서버 API 대체) ──
     *
     * 현재 구조:
     *   GUEST_ACCOUNTS 객체에서 아이디로 계정 조회 후 비밀번호 비교
     *
     * 실 DB 연동 후 대체할 코드 예시:
     *   const res  = await fetch('/api/login', {
     *     method : 'POST',
     *     headers: { 'Content-Type': 'application/json' },
     *     body   : JSON.stringify({ id, password: pw })
     *   });
     *   const data = await res.json();
     *   if (!res.ok) { ... 에러 처리 ... }
     *   else         { ... 성공 처리 ... }
     */
    setTimeout(() => {

      const account = GUEST_ACCOUNTS[id]; // DB 조회 역할 (임시)

      if (!account || account.password !== pw) {
        // 로그인 실패 처리
        btn.classList.remove('loading');
        btn.disabled = false;
        showError('아이디 또는 비밀번호가 올바르지 않습니다.');
        document.getElementById('inputPw').value = ''; // 비밀번호 초기화
        document.getElementById('inputPw').focus();
        return;
      }

      // 로그인 성공 — sessionStorage에 사용자 정보 저장
      // (대시보드에서 이 값을 읽어 아바타, 이름 등에 사용)
      sessionStorage.setItem('guestId',       id);
      sessionStorage.setItem('guestName',     account.name);
      sessionStorage.setItem('guestInitials', account.initials);
      sessionStorage.setItem('guestColor',    account.color);

      // 전환 로딩 오버레이 + 프로그레스 바 순차 애니메이션
      const overlay     = document.getElementById('loadingOverlay');
      const bar         = document.getElementById('loadingBar');
      const loadingText = document.getElementById('loadingText');

      overlay.classList.add('show');
      loadingText.textContent = `${account.name}님, 환영합니다!`;

      setTimeout(() => { bar.style.width = '45%'; }, 100);
      setTimeout(() => { bar.style.width = '80%'; loadingText.textContent = '데이터 불러오는 중...'; }, 500);
      setTimeout(() => { bar.style.width = '100%'; loadingText.textContent = '완료!'; }, 1000);

      // 1.4초 후 대시보드로 이동
      setTimeout(() => {
        window.location.href = 'crossfit-dashboard.html';
      }, 1400);

    }, 600); // 0.6초 딜레이 — 서버 응답 시간 시뮬레이션 (실제 API 사용 시 제거)
  }

  /* ── 엔터키로 로그인 폼 제출 지원 ── */
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  /* ── 입력 시 에러 메시지 자동 숨김 ── */
  document.getElementById('inputId').addEventListener('input', hideError);
  document.getElementById('inputPw').addEventListener('input', hideError);
</script>
</body>
</html>
